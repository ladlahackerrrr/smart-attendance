{% extends "base.html" %}

{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="mb-4">
                <i class="bi bi-shield-slash-fill text-danger" style="font-size: 6rem;"></i>
            </div>
            <h1 class="display-4 fw-bold text-danger">403</h1>
            <h3 class="mb-3 text-secondary">Access Denied</h3>
            <p class="text-muted mb-4">
                You do not have permission to access this resource. Please make sure you are logged into an authorized role.
            </p>
            <a href="/" class="btn btn-primary-gradient px-4">Go to Homepage</a>
        </div>
    </div>
</div>
{% endblock %}
