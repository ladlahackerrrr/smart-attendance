{% macro render_empty_state(icon, title, message, action_text=None, action_url=None) %}
<div class="empty-state text-center py-5 px-4">
    <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-4" style="width:88px;height:88px;background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(6,182,212,0.08));">
        <i class="bi {{ icon }}" style="font-size:2.2rem;background:linear-gradient(135deg,#6366f1,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;"></i>
    </div>
    <h5 class="fw-bold text-dark mb-2">{{ title }}</h5>
    <p class="text-muted mb-4 mx-auto" style="max-width:360px;font-size:0.9rem;">{{ message }}</p>
    {% if action_text and action_url %}
    <a href="{{ action_url }}" class="btn btn-primary rounded-3 px-4 py-2" style="background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;">
        {{ action_text }}
    </a>
    {% endif %}
</div>
{% endmacro %}
