{% macro card_skeleton() %}
<div class="card border-0 rounded-4 shadow-sm overflow-hidden">
    <div class="card-body p-4">
        <div class="placeholder-glow">
            <div class="d-flex align-items-center gap-3 mb-3">
                <span class="placeholder rounded-circle" style="width:48px;height:48px;"></span>
                <div class="flex-grow-1">
                    <span class="placeholder col-6 rounded-2" style="height:14px;display:block;margin-bottom:8px;"></span>
                    <span class="placeholder col-4 rounded-2" style="height:10px;display:block;"></span>
                </div>
            </div>
            <span class="placeholder col-8 rounded-2" style="height:28px;display:block;margin-bottom:8px;"></span>
            <span class="placeholder col-5 rounded-2" style="height:12px;display:block;"></span>
        </div>
    </div>
</div>
{% endmacro %}

{% macro table_skeleton(rows=5, cols=6) %}
<div class="card border-0 rounded-4 shadow-sm overflow-hidden">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        {% for c in range(cols) %}
                        <th class="border-0 py-3 px-3">
                            <span class="placeholder col-8 rounded-2 placeholder-glow" style="height:12px;display:block;"></span>
                        </th>
                        {% endfor %}
                    </tr>
                </thead>
                <tbody>
                    {% for r in range(rows) %}
                    <tr>
                        {% for c in range(cols) %}
                        <td class="py-3 px-3">
                            <span class="placeholder col-{{ [6, 8, 5, 7, 4, 9][c % 6] }} rounded-2 placeholder-glow" style="height:14px;display:block;"></span>
                        </td>
                        {% endfor %}
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endmacro %}

{% macro stat_skeleton() %}
<div class="card border-0 rounded-4 shadow-sm">
    <div class="card-body p-3">
        <div class="placeholder-glow">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <span class="placeholder col-5 rounded-2" style="height:12px;display:block;"></span>
                <span class="placeholder rounded-circle" style="width:40px;height:40px;"></span>
            </div>
            <span class="placeholder col-4 rounded-2" style="height:32px;display:block;margin-bottom:8px;"></span>
            <span class="placeholder col-6 rounded-2" style="height:10px;display:block;"></span>
        </div>
    </div>
</div>
{% endmacro %}
