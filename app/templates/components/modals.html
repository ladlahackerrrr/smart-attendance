<!-- Confirm Delete Modal -->
<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-labelledby="confirmDeleteLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow-lg overflow-hidden">
            <div class="modal-body text-center p-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width:64px;height:64px;background:rgba(239,68,68,0.1);">
                    <i class="bi bi-trash3 fs-2 text-danger"></i>
                </div>
                <h5 class="fw-bold mb-2" id="confirmDeleteLabel">Confirm Deletion</h5>
                <p class="text-muted mb-0" id="confirmDeleteMessage">Are you sure you want to delete this item? This action cannot be undone.</p>
            </div>
            <div class="modal-footer border-0 justify-content-center gap-2 pb-4 pt-0">
                <button type="button" class="btn btn-light rounded-3 px-4" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger rounded-3 px-4" id="confirmDeleteBtn">
                    <i class="bi bi-trash3 me-1"></i> Delete
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Success Modal -->
<div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 rounded-4 shadow-lg overflow-hidden">
            <div class="modal-body text-center p-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width:72px;height:72px;background:rgba(16,185,129,0.1);">
                    <i class="bi bi-check-lg fs-1 text-success"></i>
                </div>
                <h5 class="fw-bold mb-2" id="successModalLabel">Success!</h5>
                <p class="text-muted mb-0" id="successModalMessage">Operation completed successfully.</p>
            </div>
            <div class="modal-footer border-0 justify-content-center pb-4 pt-0">
                <button type="button" class="btn btn-success rounded-3 px-4" data-bs-dismiss="modal">Got it</button>
            </div>
        </div>
    </div>
</div>

<!-- Generic Form Modal -->
<div class="modal fade" id="formModal" tabindex="-1" aria-labelledby="formModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow-lg overflow-hidden">
            <div class="modal-header border-0 px-4 pt-4 pb-0">
                <h5 class="modal-title fw-bold" id="formModalLabel">Form</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body px-4 py-3" id="formModalBody">
                <!-- Dynamic form content injected here via JS -->
            </div>
            <div class="modal-footer border-0 px-4 pb-4 pt-0">
                <button type="button" class="btn btn-light rounded-3 px-4" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary rounded-3 px-4" id="formModalSubmitBtn">
                    <span class="spinner-border spinner-border-sm d-none me-1" id="formModalSpinner" role="status"></span>
                    <span id="formModalSubmitText">Save</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function showDeleteConfirm(title, message, onConfirm) {
    const modal = document.getElementById('confirmDeleteModal');
    if (title) document.getElementById('confirmDeleteLabel').textContent = title;
    if (message) document.getElementById('confirmDeleteMessage').textContent = message;
    const btn = document.getElementById('confirmDeleteBtn');
    const newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    newBtn.addEventListener('click', () => {
        onConfirm();
        bootstrap.Modal.getInstance(modal).hide();
    });
    new bootstrap.Modal(modal).show();
}

function showSuccessModal(title, message) {
    if (title) document.getElementById('successModalLabel').textContent = title;
    if (message) document.getElementById('successModalMessage').textContent = message;
    new bootstrap.Modal(document.getElementById('successModal')).show();
}
</script>
